name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "rc-[0-9]+.[0-9]+.[0-9]+"
      - "alpha-[0-9]+.[0-9]+.[0-9]+"
      - "beta-[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write     # create release, upload assets
  id-token: write     # cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compute release metadata
        id: meta
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          # Strip the `v` or `<prefix>-` from tag to get the bare version.
          case "$TAG" in
            v*)         VERSION="${TAG#v}" ;;
            *-*)        VERSION="${TAG#*-}" ;;
          esac
          REL="https://github.com/${GITHUB_REPOSITORY}/releases"
          MANIFEST="${REL}/latest/download/system.json"
          DOWNLOAD="${REL}/download/${TAG}/od6s.zip"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "manifest=$MANIFEST"
            echo "download=$DOWNLOAD"
            # Tags starting with `v` are stable releases; everything else
            # (rc-/alpha-/beta-) is a prerelease and must not become "latest".
            if [ "${TAG#v}" != "$TAG" ]; then
              echo "prerelease=false"
            else
              echo "prerelease=true"
            fi
          } >> "$GITHUB_OUTPUT"
          sed -i "s|\"version\":.*|\"version\": \"${VERSION}\",|" src/system.json
          sed -i "s|\"manifest\":.*|\"manifest\": \"${MANIFEST}\",|" src/system.json
          sed -i "s|\"download\":.*|\"download\": \"${DOWNLOAD}\",|" src/system.json

      - run: pnpm run build

      - name: Package zip
        run: |
          set -eu
          mkdir -p build/artifacts
          cp -r src build/od6s
          (cd build && zip -r artifacts/od6s.zip od6s/)
          (cd build/artifacts && sha256sum od6s.zip > od6s.zip.sha256)

      - name: Generate CycloneDX SBOM
        run: >
          pnpm exec cdxgen
          --type pnpm
          --no-recurse
          --spec-version 1.6
          --output build/artifacts/sbom.cdx.json
          .

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign artifacts (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -eu
          cd build/artifacts
          cosign sign-blob --output-signature od6s.zip.sig         --output-certificate od6s.zip.pem         od6s.zip
          cosign sign-blob --output-signature sbom.cdx.json.sig    --output-certificate sbom.cdx.json.pem    sbom.cdx.json
          cd "$GITHUB_WORKSPACE"
          cosign sign-blob --output-signature src/system.json.sig  --output-certificate src/system.json.pem  src/system.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            build/artifacts/od6s.zip
            build/artifacts/od6s.zip.sha256
            build/artifacts/od6s.zip.sig
            build/artifacts/od6s.zip.pem
            build/artifacts/sbom.cdx.json
            build/artifacts/sbom.cdx.json.sig
            build/artifacts/sbom.cdx.json.pem
            src/system.json
            src/system.json.sig
            src/system.json.pem
