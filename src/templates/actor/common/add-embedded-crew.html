<form autocomplete="off" onsubmit="event.preventDefault();">
    <div class="flexrow flex-group-left">
        <label for="addembeddedcrew">{{localize "NONEX_IST_OD6S.ADD"}}:</label>
        <select name="addembeddedcrew" id="addembeddedcrew">
            
                {{#each object.targets as | target |}}
                    <option value="{{target.uuid}}" {{#if (eq target.uuid target)}}selected{{/if}}>{{target.name}}</option>
                {{/each}}
            
        </select>
    </div>
    <input name="actor" type="hidden" value="{{object.actor}}">
    <div class="flexrow flex-group-center"
         data-message-actor="{{object.actor}}">
        <button type="submit" name="submit" value="submit">{{localize "NONEX_IST_OD6S.SUBMIT"}}</button>
        <button type="submit" name="cancel" value="cancel">{{localize "NONEX_IST_OD6S.CANCEL"}}</button>
    </div>
</form>
